<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Arivazhagan</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="balloons-container"></div>
    
    <section id="homepage" class="section">
        <div class="welcome-content">
            <h1 class="welcome-text">Welcome 🎉</h1>
            <p class="subtitle">Click below to start the party</p>
            <button id="start-btn" class="start-btn">Start Party 🎂</button>
        </div>
    </section>
    
    <section id="birthday-section" class="section hidden">
        <div class="birthday-content">
            <h1 class="birthday-text">🎉 Happy Birthday Gopinaath 🎂</h1>
            <p class="birthday-message">Wishing you a wonderful year ahead!</p>
            <div class="floating-emojis">
                <span class="emoji">🎉</span>
                <span class="emoji">🎈</span>
                <span class="emoji">🎂</span>
                <span class="emoji">✨</span>
                <span class="emoji">🎁</span>
                <span class="emoji">🥳</span>
            </div>
        </div>
        <div id="confetti-container"></div>
    </section>
    
    <div class="fireworks" id="fireworks"></div>

    <audio id="bg-music" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3" loop></audio>
    <audio id="click-sound" src="https://www.soundjay.com/button/sounds/button-3.mp3"></audio>
    
    <script src="script.js"></script>
</body>
</html>
